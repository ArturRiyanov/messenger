<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мессенджер</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        #auth, #app { max-width: 600px; margin: auto; }
        input, button { padding: 8px; margin: 5px; }
        .chat, .message { border: 1px solid #ccc; padding: 10px; margin: 5px 0; }
        .chat { cursor: pointer; background-color: #f9f9f9; }
        .chat:hover { background-color: #e9e9e9; }
        #messages { height: 300px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; }
    </style>
</head>
<body>
<div id="auth">
    <h2>Регистрация</h2>
    <input type="text" id="regUsername" placeholder="Логин"><br>
    <input type="email" id="regEmail" placeholder="Email"><br>
    <input type="password" id="regPassword" placeholder="Пароль"><br>
    <button onclick="register()">Зарегистрироваться</button>

    <h2>Вход</h2>
    <input type="text" id="loginUsername" placeholder="Логин"><br>
    <input type="password" id="loginPassword" placeholder="Пароль"><br>
    <button onclick="login()">Войти</button>
    <div id="authError" style="color:red;"></div>
</div>

<div id="app" style="display:none;">
    <h2>Добро пожаловать, <span id="username"></span>!</h2>
    <button onclick="logout()">Выйти</button>

    <h3>Ваши чаты</h3>
    <div id="chats"></div>

    <h3>Создать новый чат</h3>
    <input type="text" id="chatName" placeholder="Название чата (оставьте пустым для личного)">
    <input type="text" id="participantIds" placeholder="ID участников через запятую (например: 2,3)">
    <button onclick="createChat()">Создать чат</button>

    <h3>Текущий чат</h3>
    <div id="currentChat"></div>
    <div id="messages"></div>
    <input type="text" id="messageContent" placeholder="Сообщение">
    <button onclick="sendMessage()">Отправить</button>
</div>

<script>
    let token = localStorage.getItem('token');
    let currentChatId = null;

    if (token) {
        showApp();
        loadChats();
    } else {
        document.getElementById('auth').style.display = 'block';
    }

    async function register() {
        const username = document.getElementById('regUsername').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const url = `/api/test/register?username=${encodeURIComponent(username)}&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`;
        const response = await fetch(url, { method: 'POST' });
        if (response.ok) {
            alert('Регистрация успешна! Теперь войдите.');
        } else {
            const text = await response.text();
            document.getElementById('authError').innerText = 'Ошибка: ' + text;
        }
    }

    async function login() {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        const response = await fetch('/api/test/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        if (response.ok) {
            const data = await response.json();
            token = data.token;
            localStorage.setItem('token', token);
            document.getElementById('username').innerText = data.username;
            showApp();
            loadChats();
        } else {
            document.getElementById('authError').innerText = 'Неверный логин или пароль';
        }
    }

    function showApp() {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'block';
    }

    function logout() {
        localStorage.removeItem('token');
        token = null;
        currentChatId = null;
        document.getElementById('auth').style.display = 'block';
        document.getElementById('app').style.display = 'none';
    }

    async function loadChats() {
        const response = await fetch('/api/chats', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const chats = await response.json();
        const chatsDiv = document.getElementById('chats');
        chatsDiv.innerHTML = '';
        chats.forEach(chat => {
            const div = document.createElement('div');
            div.className = 'chat';
            div.innerText = chat.name ? chat.name : 'Личный чат с ' + chat.participants.map(p => p.username).join(', ');
            div.onclick = () => openChat(chat.id);
            chatsDiv.appendChild(div);
        });
    }

    async function openChat(chatId) {
        currentChatId = chatId;
        document.getElementById('currentChat').innerText = 'Чат ID: ' + chatId;
        const response = await fetch(`/api/chats/${chatId}/messages`, {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const messages = await response.json();
        const messagesDiv = document.getElementById('messages');
        messagesDiv.innerHTML = '';
        messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<b>${msg.sender.username}:</b> ${msg.content} <i>(${new Date(msg.createdAt).toLocaleString()})</i>`;
            messagesDiv.appendChild(div);
        });
    }

    async function createChat() {
        const name = document.getElementById('chatName').value || null;
        const ids = document.getElementById('participantIds').value.split(',').map(id => parseInt(id.trim()));
        const response = await fetch('/api/chats', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ name, participantIds: ids })
        });
        if (response.ok) {
            alert('Чат создан');
            loadChats();
        } else {
            alert('Ошибка создания чата');
        }
    }

    async function sendMessage() {
        if (!currentChatId) return alert('Выберите чат');
        const content = document.getElementById('messageContent').value;
        const response = await fetch('/api/chats/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ chatId: currentChatId, content })
        });
        if (response.ok) {
            document.getElementById('messageContent').value = '';
            openChat(currentChatId); // перезагрузить сообщения
        } else {
            alert('Ошибка отправки');
        }
    }

    // Автоматическое обновление сообщений каждые 5 секунд (polling)
    setInterval(() => {
        if (currentChatId && token) {
            openChat(currentChatId);
        }
    }, 5000);
</script>
</body>
</html>
